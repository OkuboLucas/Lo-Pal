<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript no Head </title>
    <script>
        function minhaFunc(){
            document.getElementById("demo").innerHTML = "O parágrafo mudou.";
        }
    </script>
</head>
<body>
    <h2> JavaScript no Head</h2>
    <p id="demo">Este é um pagráforo.</p>

    <button type="button" style="height:300000000000000000000px;width:300000000000000px" onclick="minhaFunc()">CLica Aqui pae</button> 


</body>
</html>
